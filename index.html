<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snake Game</title>
<style>
    body {
        margin: 0;
        background: #111;
        color: white;
        font-family: Arial;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    h1 {
        margin-top: 15px;
    }

    canvas {
        background: #222;
        margin-top: 10px;
        border: 2px solid #00ff88;
    }

    .score {
        margin-top: 10px;
        font-size: 18px;
    }
</style>
</head>
<body>

<h1>🐍 Snake Game</h1>
<div class="score">Score: <span id="score">0</span></div>

<canvas id="game" width="400" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const grid = 20;
let count = 0;

let snake = {
    x: 160,
    y: 160,
    dx: grid,
    dy: 0,
    cells: [],
    maxCells: 4
};

let food = {
    x: 320,
    y: 320
};

let score = 0;

function randomPos() {
    return Math.floor(Math.random() * 20) * grid;
}

document.addEventListener("keydown", (e) => {
    if (e.key === "ArrowLeft" && snake.dx === 0) {
        snake.dx = -grid;
        snake.dy = 0;
    } else if (e.key === "ArrowUp" && snake.dy === 0) {
        snake.dy = -grid;
        snake.dx = 0;
    } else if (e.key === "ArrowRight" && snake.dx === 0) {
        snake.dx = grid;
        snake.dy = 0;
    } else if (e.key === "ArrowDown" && snake.dy === 0) {
        snake.dy = grid;
        snake.dx = 0;
    }
});

function loop() {
    requestAnimationFrame(loop);

    if (++count < 6) return;
    count = 0;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    snake.x += snake.dx;
    snake.y += snake.dy;

    // wall collision
    if (snake.x < 0 || snake.x >= canvas.width || snake.y < 0 || snake.y >= canvas.height) {
        resetGame();
    }

    snake.cells.unshift({ x: snake.x, y: snake.y });

    if (snake.cells.length > snake.maxCells) {
        snake.cells.pop();
    }

    // draw food
    ctx.fillStyle = "lime";
    ctx.fillRect(food.x, food.y, grid - 1, grid - 1);

    // draw snake
    ctx.fillStyle = "#00ffcc";
    snake.cells.forEach((cell, index) => {
        ctx.fillRect(cell.x, cell.y, grid - 1, grid - 1);

        // self collision
        if (cell.x === snake.x && cell.y === snake.y && index !== 0) {
            resetGame();
        }
    });

    // food eating
    if (snake.x === food.x && snake.y === food.y) {
        snake.maxCells++;
        score++;
        document.getElementById("score").innerText = score;
        food.x = randomPos();
        food.y = randomPos();
    }
}

function resetGame() {
    snake.x = 160;
    snake.y = 160;
    snake.cells = [];
    snake.maxCells = 4;
    snake.dx = grid;
    snake.dy = 0;
    score = 0;
    document.getElementById("score").innerText = score;
    food.x = randomPos();
    food.y = randomPos();
}

requestAnimationFrame(loop);
</script>

</body>
</html>
